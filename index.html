<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOL — Composable CDP + Data Clean Room (HAVAS)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Lato:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --sf:#29B5E8; --sf-dark:#042130; --sf-navy:#212D35; --sf-link:#249EDC; --orange:#FF9F36;
    --body:#2D3742; --muted:#5C6B78; --bg:#F6F9FA; --card:#FFFFFF; --border:#ECEEF1; --highlight:#D4F0FA;
    --green:#2E7D32; --code:#042130;
    --font-h:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --font-b:'Lato',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --font-code:'Space Mono',Menlo,Monaco,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--body);font-family:var(--font-b);line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:var(--sf-link);text-decoration:none}
  a:hover{text-decoration:underline}
  .layout{display:flex;min-height:100vh}
  /* Sidebar */
  nav.side{width:300px;flex:0 0 300px;background:var(--card);border-right:1px solid var(--border);position:sticky;top:0;height:100vh;overflow-y:auto;padding:24px 14px}
  nav.side .logo{padding:0 12px 16px;border-bottom:1px solid var(--border);margin-bottom:14px}
  nav.side .logo img{width:148px;display:block}
  nav.side .brand{font-family:var(--font-h);font-weight:800;font-size:15px;letter-spacing:.2px;margin-bottom:4px;color:var(--sf-navy)}
  nav.side .sub{color:var(--muted);font-size:12px;margin-bottom:20px}
  nav.side a.item{display:block;color:#3C4751;padding:8px 12px;border-radius:8px;font-size:13.5px;margin:2px 0;border-left:3px solid transparent}
  nav.side a.item:hover{background:var(--bg);border-left-color:var(--sf)}
  nav.side a.item.active{background:var(--highlight);color:var(--sf-navy);border-left:3px solid var(--sf);font-weight:700}
  nav.side .grp{color:#78889A;font-size:10.5px;text-transform:uppercase;letter-spacing:1px;margin:18px 12px 6px;font-family:var(--font-h);font-weight:700}
  /* Main */
  main{flex:1;max-width:980px;margin:0 auto;padding:32px 48px 120px}
  header.hero{background:linear-gradient(180deg,var(--sf-dark) 0%,var(--sf-navy) 100%);border-radius:16px;padding:32px 40px 36px;margin-bottom:28px;color:#fff}
  header.hero .hero-logos{display:flex;align-items:center;gap:18px;margin-bottom:20px}
  header.hero .hero-logos img.sf{height:30px}
  header.hero .hero-logos .divider{width:1px;height:28px;background:rgba(255,255,255,.3)}
  header.hero .hero-logos img.cli{height:20px;filter:brightness(0) invert(1);opacity:.95}
  header.hero .hero-author{margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.14);font-size:13px;color:rgba(255,255,255,.72)}
  header.hero .hero-author b{color:#fff;font-family:var(--font-h);font-weight:700}
  header.hero h1{font-family:var(--font-h);font-size:30px;font-weight:800;letter-spacing:-.01em;margin:0 0 8px;color:#fff}
  header.hero p{color:#cfe0ea;margin:0;font-size:15px}
  header.hero p b{color:var(--sf)}
  section.part{display:none;animation:fade .25s ease}
  section.part.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  h2{font-family:var(--font-h);font-size:23px;margin:8px 0 10px;color:var(--sf-navy);font-weight:800}
  h2 .num{display:inline-block;min-width:36px;height:36px;line-height:36px;text-align:center;border-radius:50%;
    background:var(--sf);color:#fff;font-family:var(--font-h);font-weight:800;font-size:15px;margin-right:12px;vertical-align:middle}
  h3{font-family:var(--font-h);font-size:13px;color:var(--sf-link);margin:22px 0 6px;text-transform:uppercase;letter-spacing:.6px;font-weight:700}
  ul,ol{margin:8px 0 8px 4px;padding-left:22px}
  li{margin:4px 0}
  li ul{margin:6px 0 8px;list-style:none;padding-left:14px}
  li ul li{position:relative;padding-left:14px;color:var(--body)}
  li ul li:before{content:"";position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%;background:var(--sf)}
  .pill{display:inline-block;font-family:var(--font-h);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-right:8px}
  .pill.obj{background:#E3F6E8;color:var(--green)}
  .pill.res{background:var(--highlight);color:#0E6F9A}
  .pill.gui{background:#EFEAFB;color:#6A4FD0}
  .obj-line{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin:10px 0;box-shadow:0 1px 2px rgba(33,45,53,.04)}
  .byline{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin:14px 0 2px;font-size:13.5px;color:var(--muted)}
  .byline .who{font-family:var(--font-h);font-weight:700;color:var(--sf-navy)}
  .byline .role{font-size:12px;background:var(--highlight);color:#0E6F9A;padding:2px 10px;border-radius:20px;font-weight:700;font-family:var(--font-h)}
  .res-line{border-left:4px solid var(--sf);background:#E8F6FD;padding:10px 16px;border-radius:0 8px 8px 0;margin:12px 0}
  .gotcha{border-left:4px solid var(--orange);background:#FFF7EC;padding:10px 16px;border-radius:0 8px 8px 0;margin:12px 0;font-size:14px;color:#7a5a1e}
  .gotcha b{color:#B26A00;font-family:var(--font-h)}
  .biz{border-left:4px solid var(--green);background:#F1FAF3;padding:11px 16px;border-radius:0 8px 8px 0;margin:12px 0;font-size:14.5px;color:#2c4a30}
  .biz b{color:var(--green);font-family:var(--font-h)}
  .biz .lbl{display:inline-block;font-family:var(--font-h);font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:20px;margin-right:8px;background:#E3F6E8;color:var(--green);letter-spacing:.4px}
  .anode{cursor:pointer}
  .anode .ok{display:none}
  .anode.on .ok{display:block}
  .anode.on > rect{stroke:#2E7D32 !important;stroke-width:3 !important}
  .anode:hover > rect{filter:brightness(.96)}
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:16px 0}
  .metric{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;box-shadow:0 1px 2px rgba(33,45,53,.04)}
  .metric .v{font-family:var(--font-h);font-size:27px;font-weight:800;color:var(--sf)}
  .metric .k{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.35}
  .prompt{position:relative;background:var(--code);border-radius:10px;margin:8px 0 4px;box-shadow:0 1px 3px rgba(4,33,48,.12)}
  .prompt .lbl{font-family:var(--font-h);font-size:11px;color:#7da6bd;padding:9px 14px 0;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .prompt pre{margin:0;padding:8px 14px 14px;overflow-x:auto;font-family:var(--font-code);font-size:12.5px;color:#E8F0F5;white-space:pre-wrap;line-height:1.55}
  .prompt .copy{position:absolute;top:8px;right:8px;background:var(--sf);color:#fff;border:none;
    border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer;font-weight:700;font-family:var(--font-h)}
  .prompt .copy:hover{background:#1f9fd0}
  .prompt .copy.done{background:var(--green)}
  .navbtns{display:flex;justify-content:space-between;margin-top:40px;gap:12px}
  .navbtns button{background:var(--card);color:var(--sf-navy);border:1px solid var(--border);border-radius:10px;padding:11px 20px;font-size:14px;cursor:pointer;font-weight:700;font-family:var(--font-h)}
  .navbtns button:hover:not(:disabled){border-color:var(--sf);color:var(--sf)}
  .navbtns button:disabled{opacity:.4;cursor:default}
  code.inl{background:#EEF3F6;padding:1px 6px;border-radius:5px;font-family:var(--font-code);font-size:12px;color:var(--sf-navy);border:1px solid var(--border)}
  .progress{height:6px;background:rgba(255,255,255,.25);border-radius:4px;overflow:hidden;margin:16px 0 0}
  .progress > div{height:100%;background:var(--sf);width:0;transition:width .3s}
  @media(max-width:840px){nav.side{display:none}main{padding:24px}}
</style>
</head>
<body>
<div class="layout">
  <nav class="side" id="nav"></nav>
  <main>
    <header class="hero">
      <div class="hero-logos">
        <img class="sf" src="https://www.snowflake.com/wp-content/themes/snowflake/assets/img/logo-white.svg" alt="Snowflake">
        <span class="divider"></span>
        <img class="cli" src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Havas_logo.svg" alt="Havas">
      </div>
      <h1>HOL — Composable CDP + Data Clean Room</h1>
      <p>De cero a app · composable CDP + Data Clean Room cross-account sobre 2 CRMs HubSpot (mundo mascotas)</p>
      <div class="progress"><div id="bar"></div></div>
      <div class="hero-author"><b>Autor: Jorge Parrado</b> · Senior Solution Engineer</div>
    </header>
    <div id="content"></div>
    <div class="navbtns">
      <button id="prev">← Anterior</button>
      <button id="next">Siguiente →</button>
    </div>
  </main>
</div>

const parts = [
 {id:"intro", grp:"Inicio", title:"Preámbulo", html:`
  <h2>Preámbulo</h2>
  <h3>Cliente</h3>
  <div class="obj-line"><b>HAVAS</b> — agencia de medios/datos. <b>Escenario:</b> dos marcas-cliente del mundo mascotas — <b>Tienda Ceba</b> (retailer) y <b>Padre de Mascotas</b> (comunidad/clínica) — buscan campañas conjuntas sin intercambiar PII cruda.</div>
  <h3>Objetivos de aprendizaje</h3>
  <ul>
    <li>Construir un composable CDP donde los datos viven en Snowflake (360, identidad, propensión, segmentos, lookalikes).</li>
    <li>Aplicar gobierno: masking de PII y row access por consentimiento.</li>
    <li>Montar un Data Clean Room cross-account y medir overlap con k-anonymity, activando sin exponer identidades.</li>
    <li>Exponer todo en una app React (SPCS) y un agente Cortex en lenguaje natural.</li>
  </ul>
  <h3>Prerrequisitos</h3>
  <ul>
    <li>Dos cuentas Snowflake con <code class="inl">ACCOUNTADMIN</code>:
      <ul>
        <li><b>Cuenta A</b> — Tienda Ceba · locator <code class="inl">HQB73140</code> · <code class="inl">AWS_US_WEST_2</code> · conexión CoCo <code class="inl">demo_account_aws</code></li>
        <li><b>Cuenta B</b> — Padre de Mascotas · locator <code class="inl">UHB57140</code> · conexión CoCo <code class="inl">demo_account_aws_2</code></li>
      </ul>
    </li>
    <li>Data Clean Rooms instalado en ambas (<code class="inl">SAMOOHA_BY_SNOWFLAKE_LOCAL_DB</code>).</li>
    <li>snow CLI y Docker. <b>Momento cero:</b> la Tienda Ceba inicia con un export crudo <code class="inl">HAVAS_CEBA_DEMO.PUBLIC.TIENDA_CEBA_CRUDO</code> (~512.010 filas, con ~12.000 duplicados); Padre de Mascotas ya está <b>pre-provisionada</b> (audiencia hasheada lista). El warehouse dedicado se crea en la Parte 1.</li>
    <li><b>Escala:</b> ~500.010 contactos por marca. El warehouse arranca en XSMALL; sólo el entrenamiento del modelo (Parte 6) sube a MEDIUM y luego vuelve a XSMALL.</li>
    <li><b>Nota de conexión:</b> usa <code class="inl">demo_account_aws_2</code> para la Cuenta B (la conexión por SSO <code class="inl">uhb57140</code> falla por configuración SAML).</li>
  </ul>
  <h3>Arquitectura y stack</h3>
  <ul>
    <li>Ingesta: export crudo de la Tienda Ceba (tabla fuente) → CRM; Padre de Mascotas llega pre-lista.</li>
    <li>CDP: CRM → SILVER → EVENTS → GOLD → ML → SEGMENTS → GOBIERNO → APP.</li>
    <li>IA: ML.CLASSIFICATION (propensión), VECTOR_COSINE_SIMILARITY (lookalikes), Cortex Analyst + agente.</li>
    <li>Clean Room: Collaboration API (SAMOOHA) cross-account A↔B sobre HASHED_EMAIL (correo hasheado SHA-256).</li>
    <li>App: React + D3 (Vite) en SPCS con URL pública SSO.</li>
  </ul>
  <h3>Pre-check cross-account</h3>
  <p>En cada cuenta corre y anota el par <code class="inl">ORG.ACCOUNT</code> (se usa para invitar en el Clean Room):</p>
  ${prompt("SQL","SELECT CURRENT_ORGANIZATION_NAME(), CURRENT_ACCOUNT_NAME(), CURRENT_ACCOUNT();")}
 `},
 {id:"negocio", grp:"Inicio", title:"Resumen para negocio", html:`
  <h2>El caso de negocio en 1 minuto</h2>
  <div class="biz"><span class="lbl">PARA NEGOCIO</span>Dos marcas de mascotas — <b>Tienda Ceba</b> y <b>Padre de Mascotas</b> — quieren hacer campañas conjuntas, pero <b>ninguna quiere entregarle su base de clientes a la otra</b>. Con Snowflake cada marca activa sus datos en su propia cuenta y, en un espacio seguro (Data Clean Room), descubren a sus clientes en común para activarlos en una campaña conjunta — sin compartir ni un solo correo.</div>
  <h3>La historia en 4 actos</h3>
  <ol>
    <li><b>Cada marca conoce a su cliente</b> — la Tienda Ceba monta el CDP completo (limpia, enriquece y predice quién comprará). Padre de Mascotas solo prepara su lista.</li>
    <li><b>Privacidad por diseño</b> — datos personales enmascarados y solo se usan clientes que dieron consentimiento.</li>
    <li><b>Terreno neutral</b> — el Clean Room revela cuántos clientes comparten, sin que nadie vea los del otro.</li>

 `},

    <g class="anode" data-k="crm"><rect x="40" y="150" width="160" height="62" rx="8" fill="#FDEBD0" stroke="#E67E22" stroke-width="2"/><text x="120" y="174" text-anchor="middle" font-size="12.5" font-weight="700">CRM</text><text x="120" y="190" text-anchor="middle" font-size="11" fill="#7a5a1e">HUBSPOT_CONTACTS</text><text x="120" y="204" text-anchor="middle" font-size="11" fill="#7a5a1e">512k crudas</text><g class="ok"><circle cx="196" cy="154" r="10" fill="#2E7D32" stroke="#fff" stroke-width="2"/><text x="196" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">&#10003;</text></g></g>

  <p style="font-size:11.5px;color:var(--muted);margin:8px 0 0">Bronze (CRM·EVENTS) · Silver · Gold · ML/Consumo (azul) · Gobierno (morado) · Clean Room/Marca B (verde). <b>SILVER → ML → GOLD</b>; SEGMENTS/GOBIERNO/APP consumen GOLD.</p>
  <h3>Qué crea cada paso</h3>
  <table style="width:100%;border-collapse:collapse;font-size:13px">
    <tr style="background:var(--highlight)"><th style="text-align:left;padding:7px 10px;border:1px solid var(--border);width:13%">Paso</th><th style="text-align:left;padding:7px 10px;border:1px solid var(--border);width:32%">Qué crea</th><th style="text-align:left;padding:7px 10px;border:1px solid var(--border)">Qué se hace y para qué</th></tr>
    <tr><td style="padding:6px 10px;border:1px solid var(--border)">1 Setup</td><td style="padding:6px 10px;border:1px solid var(--border)">Warehouse + base + 8 esquemas (A)</td><td style="padding:6px 10px;border:1px solid var(--border)">Prepara el contenedor (cómputo + esquemas) donde vivirá el CDP.</td></tr>
    <tr><td style="padding:6px 10px;border:1px solid var(--border)">2 Ingesta</td><td style="padding:6px 10px;border:1px solid var(--border)">CRM.HUBSPOT_CONTACTS (~512k crudas)</td><td style="padding:6px 10px;border:1px solid var(--border)">Trae el export crudo del CRM tal cual (con duplicados) al lago de datos.</td></tr>
    <tr><td style="padding:6px 10px;border:1px solid var(--border)">3 Customer 360 + Identidad</td><td style="padding:6px 10px;border:1px solid var(--border)">SILVER (dedup + IDENTITY_GRAPH) → GOLD.CUSTOMER_360</td><td style="padding:6px 10px;border:1px solid var(--border)">Limpia, unifica y resuelve identidades: una ficha por persona (quita duplicados y enlaza el mismo teléfono).</td></tr>
    <tr><td style="padding:6px 10px;border:1px solid var(--border)">4 Enriquecimiento</td><td style="padding:6px 10px;border:1px solid var(--border)">EVENTS: WEB_EVENTS / PURCHASES / AD_EXPOSURE</td><td style="padding:6px 10px;border:1px solid var(--border)">Agrega comportamiento (navegación, compras, anuncios) para poder predecir.</td></tr>
    <tr><td style="padding:6px 10px;border:1px solid var(--border)">5 Propensión</td><td style="padding:6px 10px;border:1px solid var(--border)">ML.MODELO_PROPENSION → propensión/tier en GOLD.CUSTOMER_360</td><td style="padding:6px 10px;border:1px solid var(--border)">Modelo ML que puntúa quién es más propenso a comprar (tier Alto/Medio/Bajo).</td></tr>
    <tr><td style="padding:6px 10px;border:1px solid var(--border)">6 Segmentación</td><td style="padding:6px 10px;border:1px solid var(--border)">SEGMENTS (SPs, segmento, ROI) + lookalikes</td><td style="padding:6px 10px;border:1px solid var(--border)">Crea audiencias, simula su ROI y las expande con clientes similares (lookalikes).</td></tr>
    <tr><td style="padding:6px 10px;border:1px solid var(--border)">7 Semántica</td><td style="padding:6px 10px;border:1px solid var(--border)">APP.SV_CDP + Agente Cortex</td><td style="padding:6px 10px;border:1px solid var(--border)">Permite preguntar al CDP en lenguaje natural (español), con respuestas y gráficos.</td></tr>
    <tr><td style="padding:6px 10px;border:1px solid var(--border)">8 Gobierno</td><td style="padding:6px 10px;border:1px solid var(--border)">Masking + row access + roles</td><td style="padding:6px 10px;border:1px solid var(--border)">Protege la PII (enmascara) y respeta el consentimiento de marketing por fila.</td></tr>
    <tr><td style="padding:6px 10px;border:1px solid var(--border)">Padre de Mascotas</td><td style="padding:6px 10px;border:1px solid var(--border)">Audiencia hasheada (pre-lista)</td><td style="padding:6px 10px;border:1px solid var(--border)">La marca socia llega con su lista de clientes ya cifrada, lista para el cruce.</td></tr>
    <tr><td style="padding:6px 10px;border:1px solid var(--border)">9 Clean Room</td><td style="padding:6px 10px;border:1px solid var(--border)">Colaboración A↔B + overlap 125.000</td><td style="padding:6px 10px;border:1px solid var(--border)">Las dos marcas descubren sus clientes en común sin que ninguna comparta PII.</td></tr>
    <tr><td style="padding:6px 10px;border:1px solid var(--border)">10 App</td><td style="padding:6px 10px;border:1px solid var(--border)">Servicio SPCS + URL SSO</td><td style="padding:6px 10px;border:1px solid var(--border)">Cierra con una app visual (URL propia) para explorar y presentar a negocio.</td></tr>
  </table>

 {id:"demoprod", grp:"Inicio", title:"Demo vs. Producción", html:`
  <h2>Demo vs. Producción — cómo se llenan los datos</h2>
  <div class="biz"><span class="lbl">PARA NEGOCIO</span>Para mostrar el flujo completo de punta a punta, varios datos de esta demo son <b>sintéticos</b>. En una implementación real provienen de los sistemas del cliente. Aquí está, tabla por tabla, qué hago yo en la demo y qué debe tener en cuenta el cliente a futuro. <b>Filas en naranja = atajo de demo; en verde = ya es productivo.</b></div>
  <h3>Cómo se llena cada tabla</h3>
  <table style="width:100%;border-collapse:collapse;font-size:12.5px">
    <tr style="background:var(--highlight)"><th style="text-align:left;padding:7px 10px;border:1px solid var(--border);width:22%">Esquema · Tabla</th><th style="text-align:left;padding:7px 10px;border:1px solid var(--border);width:38%">En la demo (cómo la lleno)</th><th style="text-align:left;padding:7px 10px;border:1px solid var(--border)">En producción (qué considera el cliente)</th></tr>
    <tr><td style="padding:6px 10px;border:1px solid var(--border)"><b>CRM</b> · HUBSPOT_CONTACTS</td><td style="padding:6px 10px;border:1px solid var(--border)">Parte 2: copio la semilla TIENDA_CEBA_CRUDO (ya pre-cargada)</td><td style="padding:6px 10px;border:1px solid var(--border)">Conector real a HubSpot (Openflow / Fivetran / API) con cargas incrementales; capa cruda inmutable</td></tr>
    <tr style="background:#FFF7EC"><td style="padding:6px 10px;border:1px solid var(--border)"><b>EVENTS</b> · CUSTOMER_ENGAGEMENT</td><td style="padding:6px 10px;border:1px solid var(--border)">Parte 4: engagement latente (0–1) por hash del customer_id</td><td style="padding:6px 10px;border:1px solid var(--border)"><b>No existe en real</b>; es solo el motor que genera comportamiento coherente para la demo</td></tr>
    <tr style="background:#FFF7EC"><td style="padding:6px 10px;border:1px solid var(--border)"><b>EVENTS</b> · WEB_EVENTS</td><td style="padding:6px 10px;border:1px solid var(--border)">Parte 4: sesiones/páginas sintéticas</td><td style="padding:6px 10px;border:1px solid var(--border)">Analítica web real: Google Analytics, Adobe, clickstream, eventos de la app</td></tr>
    <tr style="background:#FFF7EC"><td style="padding:6px 10px;border:1px solid var(--border)"><b>EVENTS</b> · PURCHASES</td><td style="padding:6px 10px;border:1px solid var(--border)">Parte 4: compras sintéticas</td><td style="padding:6px 10px;border:1px solid var(--border)">Transacciones reales del e-commerce / POS / ERP</td></tr>
    <tr style="background:#FFF7EC"><td style="padding:6px 10px;border:1px solid var(--border)"><b>EVENTS</b> · AD_EXPOSURE</td><td style="padding:6px 10px;border:1px solid var(--border)">Parte 4: impresiones/clics sintéticos</td><td style="padding:6px 10px;border:1px solid var(--border)">Plataformas reales: Google Ads, Meta, DV360</td></tr>
    <tr><td style="padding:6px 10px;border:1px solid var(--border)"><b>SILVER</b> · HUBSPOT_CONTACTS</td><td style="padding:6px 10px;border:1px solid var(--border)">Parte 3a: normalizo y deduplico por email desde CRM</td><td style="padding:6px 10px;border:1px solid var(--border)">Reglas reales de limpieza/dedup (más identificadores, formatos por país)</td></tr>
    <tr><td style="padding:6px 10px;border:1px solid var(--border)"><b>SILVER</b> · IDENTITY_GRAPH / SUMMARY</td><td style="padding:6px 10px;border:1px solid var(--border)">Parte 3b: fusiono por teléfono/cédula compartidos</td><td style="padding:6px 10px;border:1px solid var(--border)">Identity resolution real: matching difuso, lógica de hogar, a veces proveedor externo</td></tr>
    <tr><td style="padding:6px 10px;border:1px solid var(--border)"><b>SILVER</b> · ML_FEATURES</td><td style="padding:6px 10px;border:1px solid var(--border)">Parte 5: features pre-ventana (recencia, frecuencia, sesiones, CTR, ticket) + target</td><td style="padding:6px 10px;border:1px solid var(--border)">Feature engineering sobre eventos reales; cuidar la fuga temporal</td></tr>
    <tr><td style="padding:6px 10px;border:1px solid var(--border)"><b>GOLD</b> · CUSTOMER_360</td><td style="padding:6px 10px;border:1px solid var(--border)">Partes 3 y 5: atributos + person_id + propensión/tier plegados</td><td style="padding:6px 10px;border:1px solid var(--border)">Más atributos y métricas; refresco automático con Dynamic Tables o Tasks</td></tr>
    <tr style="background:#FFF7EC"><td style="padding:6px 10px;border:1px solid var(--border)"><b>ML</b> · MODELO_PROPENSION + ML_TRAIN</td><td style="padding:6px 10px;border:1px solid var(--border)">Parte 5: entreno SNOWFLAKE.ML.CLASSIFICATION (la señal está incrustada en lo sintético)</td><td style="padding:6px 10px;border:1px solid var(--border)">La calidad depende de datos reales; requiere monitoreo y reentrenamiento periódico</td></tr>
    <tr><td style="padding:6px 10px;border:1px solid var(--border)"><b>ML</b> · CUSTOMER_VECTOR / LOOKALIKE</td><td style="padding:6px 10px;border:1px solid var(--border)">Parte 6: z-scores + similitud coseno</td><td style="padding:6px 10px;border:1px solid var(--border)">Patrón válido; cuidar qué features entran al vector</td></tr>
    <tr><td style="padding:6px 10px;border:1px solid var(--border)"><b>SEGMENTS</b> · SEGMENTOS / MIEMBROS</td><td style="padding:6px 10px;border:1px solid var(--border)">Parte 6: SP_CREAR_SEGMENTO materializa desde un WHERE sobre GOLD</td><td style="padding:6px 10px;border:1px solid var(--border)">Patrón real válido</td></tr>
    <tr style="background:#FFF7EC"><td style="padding:6px 10px;border:1px solid var(--border)"><b>SEGMENTS</b> · ACTIVACIONES (ROI)</td><td style="padding:6px 10px;border:1px solid var(--border)">Parte 6: ROI <b>simulado</b> con supuestos fijos (AOV $35, costo $9.50/$0.50, factores 0.5/0.3)</td><td style="padding:6px 10px;border:1px solid var(--border)">Costos de campaña y conversión <b>reales</b> (holdout / A·B), no fórmulas fijas</td></tr>
    <tr style="background:#F1FAF3"><td style="padding:6px 10px;border:1px solid var(--border)"><b>GOBIERNO</b> · MASK_* / RAP_CONSENT</td><td style="padding:6px 10px;border:1px solid var(--border)">Parte 8: masking por rol + consentimiento por fila</td><td style="padding:6px 10px;border:1px solid var(--border)">Productivo tal cual; clave para Habeas Data (Colombia) / GDPR</td></tr>
    <tr style="background:#F1FAF3"><td style="padding:6px 10px;border:1px solid var(--border)"><b>GOBIERNO</b> · AUDIENCIA_CLEANROOM</td><td style="padding:6px 10px;border:1px solid var(--border)">Parte 9: SHA2(email) + tier/ciudad/consent, sin PII</td><td style="padding:6px 10px;border:1px solid var(--border)">Mismo enfoque real, con revisión legal del acuerdo de colaboración entre marcas</td></tr>
    <tr style="background:#F1FAF3"><td style="padding:6px 10px;border:1px solid var(--border)"><b>APP</b> · SV_CDP + Agente</td><td style="padding:6px 10px;border:1px solid var(--border)">Parte 7: vista semántica + agente Cortex</td><td style="padding:6px 10px;border:1px solid var(--border)">Productivo; apuntar a la GOLD real y enriquecer dimensiones/métricas</td></tr>
  </table>
  <div class="gotcha"><b>Atajos de demo (cambian en real):</b> (1) todo <b>EVENTS</b> es sintético → en real son los datos de web, ventas y medios del cliente; (2) el <b>ROI</b> de SEGMENTS es simulado con supuestos fijos → en real, costos y conversión medidos; (3) el <b>modelo</b> se entrena sobre datos sintéticos con señal incrustada → en real depende de datos reales + monitoreo; (4) la <b>carga inicial</b> es una tabla semilla → en real, un conector al CRM con cargas incrementales.</div>
  <div class="biz"><span class="lbl">YA ES PRODUCTIVO</span>Se queda igual en real: la <b>arquitectura medallion</b> (CRM→SILVER→GOLD) y la separación por propósito (ML/SEGMENTS/GOBIERNO/APP); el <b>gobierno</b> (masking, consentimiento por fila, RBAC); el <b>Clean Room</b> cross-account con hash (sin compartir PII); y la <b>vista semántica + agente</b> para autoservicio en lenguaje natural.</div>
 `},
 {id:"p1", grp:"CDP · Tienda Ceba", title:"1 · Setup de bases y esquemas", html:`
  <h2><span class="num">1</span>Setup de bases y esquemas</h2>
  <div class="obj-line"><span class="pill obj">OBJETIVO</span>Crear el warehouse dedicado, la base y los esquemas de la <b>Tienda Ceba</b>. <i>Padre de Mascotas se prepara aparte, mínima.</i></div>
  <h3>Warehouse dedicado</h3>
  <p>Corre esto <b>en ambas cuentas</b>. La demo usa su propio warehouse <code class="inl">HOL_MASCOTAS_WH</code> — no reutilizamos ninguno existente:</p>
  ${prompt("SQL — en cada cuenta",`CREATE WAREHOUSE IF NOT EXISTS HOL_MASCOTAS_WH\n  WAREHOUSE_SIZE = 'XSMALL'\n  AUTO_SUSPEND = 60\n  AUTO_RESUME = TRUE\n  INITIALLY_SUSPENDED = TRUE\n  COMMENT = 'HOL CDP + Clean Room (HAVAS) - warehouse dedicado';\n\nUSE WAREHOUSE HOL_MASCOTAS_WH;`)}
  <h3>Bases y esquemas</h3>
  ${prompt("Prompt CoCo — Cuenta A","Crea la base TIENDA_CEBA_CDP con los esquemas CRM, EVENTS, SILVER, GOLD, ML, SEGMENTS, GOBIERNO y APP. Usa el warehouse HOL_MASCOTAS_WH. Solo DDL, idempotente (CREATE ... IF NOT EXISTS).")}
  <p><span class="pill gui">GUI</span>Snowsight → Data → + Database.</p>
  <div class="res-line"><span class="pill res">RESULTADO</span>Warehouse <code class="inl">HOL_MASCOTAS_WH</code> activo en ambas cuentas y la base de la Tienda Ceba con sus 8 esquemas. <i>La base mínima de B se crea en su propio paso (antes del Clean Room).</i></div>
 `},
 {id:"p2", grp:"CDP · Tienda Ceba", title:"2 · Ingesta del CRM (tabla fuente)", html:`
  <h2><span class="num">2</span>Ingesta del CRM de HubSpot</h2>
  <div class="obj-line"><span class="pill obj">OBJETIVO</span>Cargar el export crudo del CRM de Tienda Ceba al esquema CRM — tal como llega, con duplicados.</div>
  <p>El <b>momento cero</b> de la Tienda Ceba es un export crudo de HubSpot (~512.010 filas) que incluye <b>~12.000 contactos duplicados</b> (clientes que se registraron más de una vez). Se copia tal cual a CRM; la limpieza viene en la Parte 3.</p>
  <ul>
    <li>Tabla fuente (Cuenta A): <code class="inl">HAVAS_CEBA_DEMO.PUBLIC.TIENDA_CEBA_CRUDO</code></li>
  </ul>
  ${prompt("Prompt CoCo — Cuenta A","Copia HAVAS_CEBA_DEMO.PUBLIC.TIENDA_CEBA_CRUDO a TIENDA_CEBA_CDP.CRM.HUBSPOT_CONTACTS con CREATE OR REPLACE TABLE ... AS SELECT *. Luego perfila la tabla: cuenta filas totales, correos únicos y cuántos correos aparecen más de una vez (duplicados). Muéstrame un ejemplo de un correo duplicado con sus dos registros (CONTACT_ID, ESTADO_LEAD, FECHA_CREACION).")}
  <div class="res-line"><span class="pill res">RESULTADO</span>CRM.HUBSPOT_CONTACTS poblada con ~512.010 filas crudas (~12.000 correos duplicados). <i>Padre de Mascotas ya llega lista — no se carga aquí.</i></div>
  <div class="gotcha"><b>Gotcha:</b> las columnas ya vienen en SNAKE_CASE. La normalización (email minúscula/trim, teléfono solo dígitos, parseo de FECHA_CREACION con <code class="inl">DD/MM/YYYY HH24:MI</code>) y la deduplicación se hacen en la Parte 3.</div>
 `},
 {id:"p3", grp:"CDP · Tienda Ceba", title:"3 · Customer 360 + Identidad", html:`
  <h2><span class="num">3</span>Customer 360 + Resolución de identidad</h2>
  <div class="obj-line"><span class="pill obj">OBJETIVO</span>De export crudo a una ficha limpia y <b>unificada</b> por cliente: normalizar, deduplicar y resolver identidades.</div>
  <div class="biz"><span class="lbl">PARA NEGOCIO</span>Unificamos al mismo cliente en dos niveles: (1) el <b>mismo registro repetido</b> en el CRM (mismo correo) y (2) <b>registros distintos que son la misma persona</b> (comparten teléfono o cédula). Así no contamos ni contactamos dos veces a nadie. El conteo baja de <b>512.010 filas crudas a 500.010 clientes únicos</b>, cada uno con su estado más reciente.</div>
  <h3>3a · Normalizar y deduplicar</h3>
  ${prompt("Prompt CoCo","Sobre CRM.HUBSPOT_CONTACTS crea la tabla limpia SILVER.HUBSPOT_CONTACTS:\n- email en minúscula y trim; teléfono solo dígitos; nombre = NOMBRE || ' ' || APELLIDOS\n- una fila por cliente, deduplicando por email (conserva el registro más reciente por FECHA_CREACION, parseada con DD/MM/YYYY HH24:MI)\n- columnas: customer_id (CONTACT_ID), cedula, email, telefono, nombre, genero, ciudad, lifecycle_stage (ESTADO_LEAD), tipo_cliente, mascota, consent_marketing (= ESTADO_MARKETING = 'Contacto de marketing'), fecha_creacion\nMaterialízala como tabla SILVER.HUBSPOT_CONTACTS. Repórtame filas crudas vs clientes únicos finales y un ejemplo de un cliente cuyo duplicado fue resuelto (quedó con el estado más reciente).")}
  <div class="res-line"><span class="pill res">RESULTADO</span>SILVER.HUBSPOT_CONTACTS = <b>500.010</b> clientes únicos (de 512.010 crudas) — ~12.000 duplicados exactos resueltos conservando el registro más reciente.</div>
  <h3>3b · Resolución de identidad (misma persona, registros distintos)</h3>
  <div class="biz"><span class="lbl">PARA NEGOCIO</span>Dos contactos con correos diferentes pero el <b>mismo teléfono</b> suelen ser la misma persona o el mismo hogar. Los enlazamos bajo un <code class="inl">person_id</code> para una vista única real.</div>
  ${prompt("Prompt CoCo","Sobre SILVER.HUBSPOT_CONTACTS construye SILVER.IDENTITY_GRAPH resolviendo a un person_id canónico: fusiona clientes que comparten teléfono o cédula (el person_id = el menor customer_id del grupo). NO fusiones por nombre (alta cardinalidad → componentes gigantes). Crea SILVER.IDENTITY_SUMMARY con person_id, nº de customers fusionados y nº de identificadores. Finalmente ensambla la tabla de servicio GOLD.CUSTOMER_360 uniendo SILVER.HUBSPOT_CONTACTS con el person_id de SILVER.IDENTITY_GRAPH (la propensión y el tier se añaden en la Parte 5). Dame ejemplos de fusiones.")}
  <div class="gotcha"><b>Gotcha:</b> en estos datos email y cédula son únicos; las fusiones reales vienen de <b>teléfonos compartidos</b> (~139). No enlaces por nombre normalizado: con ~134k nombres en 500k filas generaría un componente gigante. <b>3a vs 3b:</b> 3a quita el <i>mismo registro repetido</i>; 3b enlaza <i>registros distintos de la misma persona</i>.</div>
  <div class="res-line"><span class="pill res">RESULTADO</span>SILVER.IDENTITY_GRAPH + SILVER.IDENTITY_SUMMARY + GOLD.CUSTOMER_360 de servicio (el grafo alimenta la pantalla force-directed de la app).</div>
 `},
 {id:"p4", grp:"CDP · Tienda Ceba", title:"4 · Enriquecimiento sintético", html:`
  <h2><span class="num">4</span>Enriquecimiento sintético de comportamiento</h2>
  <div class="obj-line"><span class="pill obj">OBJETIVO</span>Generar señal aprendible (HubSpot solo trae contactos).</div>
  <div class="biz"><span class="lbl">PARA NEGOCIO</span>Sumamos comportamiento de navegación y compra a cada contacto para poder anticipar quién va a comprar.</div>
  ${prompt("Prompt CoCo","Para cada cliente de SILVER.HUBSPOT_CONTACTS asigna un engagement latente (0-1) determinístico por hash del customer_id. Con ese engagement genera datos sintéticos coherentes:\n- EVENTS.WEB_EVENTS: nº de sesiones proporcional a engagement (usa GENERATOR + filtro seq<n; IDs contiguos con ROW_NUMBER, NO SEQ4 sobre cross-join)\n- EVENTS.PURCHASES: probabilidad de compra y ticket proporcional a engagement (AOV mascotas ~ $35)\n- EVENTS.AD_EXPOSURE: impresiones y clics, CTR proporcional a engagement\nAsegúrate de que el target \"compró en últimos 30 días\" sea predecible a partir de features ANTERIORES a esa ventana (sin fuga temporal).")}
  <div class="res-line"><span class="pill res">RESULTADO</span>3 tablas de eventos con señal.</div>
  <div class="gotcha"><b>Gotcha:</b> si features y target son aleatorios independientes, el modelo colapsa al base rate. El engagement latente crea la señal.</div>
 `},
 {id:"p6", grp:"CDP · Tienda Ceba", title:"5 · Propensión (ML)", html:`
  <h2><span class="num">5</span>Modelo de propensión (ML)</h2>
  <div class="obj-line"><span class="pill obj">OBJETIVO</span>Puntuar propensión a comprar y tier por cliente.</div>
  <div class="biz"><span class="lbl">PARA NEGOCIO</span>Un puntaje por cliente de quién está listo para comprar. En la demo, los 'Alto' compran ~4× más que los 'Bajo' (57% vs 13%).</div>
  ${prompt("Prompt CoCo","Construye SILVER.ML_FEATURES (recencia, frecuencia, sesiones, CTR, ticket promedio + target compró-30d, todo previo a la ventana de 30 días). Entrena ML.MODELO_PROPENSION con SNOWFLAKE.ML.CLASSIFICATION sobre esas features. Luego añade a GOLD.CUSTOMER_360 las columnas propension (probabilidad clase 1) y tier (Alto/Medio/Bajo). Reporta F1 y la separación de tiers.")}
  <div class="res-line"><span class="pill res">RESULTADO</span>Scores por cliente + tiers separados.</div>
  <div class="gotcha"><b>Gotcha !PREDICT:</b> las llaves del OBJECT_CONSTRUCT deben ir en MAYÚSCULA e idénticas al nombre de columna; si no, las features entran NULL y todos caen en un tier. Probabilidad = <code class="inl">pred.p:probability:"1"::FLOAT</code>. Ejecuta el PREDICT <b>desde archivo</b> (<code class="inl">snow sql -f</code>), NO con <code class="inl">-q</code>: zsh interpreta el <code class="inl">!</code> de <code class="inl">!PREDICT</code>. Sube el warehouse a <code class="inl">MEDIUM</code> para entrenar (500k filas) y vuelve a <code class="inl">XSMALL</code> al terminar.</div>
 `},
 {id:"p7", grp:"CDP · Tienda Ceba", title:"6 · Segmentación, ROI y Lookalikes", html:`
  <h2><span class="num">6</span>Segmentación, ROI y Lookalikes</h2>
  <div class="obj-line"><span class="pill obj">OBJETIVO</span>Materializar segmentos y simular ROI de activación.</div>
  <div class="biz"><span class="lbl">PARA NEGOCIO</span>Creamos audiencias con una regla y simulamos cuánto rinde cada campaña <i>antes</i> de gastar: el correo dirigido rinde 11.9× vs 1.04× del masivo.</div>
  ${prompt("Prompt CoCo — segmentos + ROI","Crea SEGMENTS.SP_CREAR_SEGMENTO(nombre, descripcion, predicado) que materialice miembros desde un WHERE sobre GOLD.CUSTOMER_360 (ya trae tier y propensión). Crea SEGMENTS.SP_ACTIVAR_SEGMENTO(id, destino) que respete consentimiento y simule ROI (paid ~$9.50/persona, email ~$0.50/persona, AOV mascotas ~$35, conversión = propensión * factor). Crea un segmento de ejemplo \"Dueños alta propensión\" y actívalo.")}
  <h3>Lookalikes — expandir el segmento</h3>
  ${prompt("Prompt CoCo — lookalikes","Crea ML.CUSTOMER_VECTOR con z-scores de las features convertidos a VECTOR(FLOAT, 10). Crea ML.SP_LOOKALIKE(seg_id, N) que devuelva los N clientes más similares al centroide del segmento usando VECTOR_COSINE_SIMILARITY. Demuéstralo sobre el segmento de alta propensión y compara la propensión media del lookalike vs la base.")}
  <div class="res-line"><span class="pill res">RESULTADO</span>SPs de segmentación + un segmento activado con ROI + lookalikes con propensión 1.6× la base.</div>
  <div class="gotcha"><b>Gotcha:</b> envuelve el cuerpo del procedimiento en $$...$$. En INSERT...VALUES no uses aritmética sobre variables; precalcula en una variable.</div>
 `},
 {id:"p9", grp:"CDP · Tienda Ceba", title:"7 · Vista semántica + Agente", html:`
  <h2><span class="num">7</span>Vista semántica + Agente Cortex</h2>
  <div class="obj-line"><span class="pill obj">OBJETIVO</span>Habilitar preguntas en lenguaje natural sobre el CDP.</div>
  <div class="biz"><span class="lbl">PARA NEGOCIO</span>Cualquiera le pregunta al CDP en español (“¿cuántos clientes de alta propensión hay en Bogotá?”) y obtiene la respuesta con gráfico, sin saber SQL.</div>
  ${prompt("Prompt CoCo — vista semántica","Crea APP.SV_CDP (semantic view en español) sobre GOLD.CUSTOMER_360 (ya trae tier/propensión): dimensiones (ciudad, lifecycle_stage, tier, género si existe), métricas ratio (tasa_consentimiento, pct_alta_propension, clientes_activables). Pon valores válidos en los COMMENT para que Analyst mapee literales. Valídala con una pregunta de ejemplo.")}
  ${prompt("Prompt CoCo — agente","Crea un agente Cortex (SNOWFLAKE_INTELLIGENCE.AGENTS.CDP_AGENT_<MARCA>) que use SV_CDP como herramienta Analyst + data_to_chart, responda en español, con 3 preguntas sugeridas de negocio.")}
  <div class="res-line"><span class="pill res">RESULTADO</span>Vista semántica validada + agente conversacional.</div>
  <div class="gotcha"><b>Gotcha:</b> en CREATE SEMANTIC VIEW el orden es obligatorio TABLES, FACTS, DIMENSIONS, METRICS. Sintaxis: <code class="inl">tabla.&lt;nombre_logico&gt; AS &lt;columna_o_expr&gt;</code>.</div>
 `},
 {id:"p10", grp:"Gobierno", title:"8 · Gobierno (masking + consentimiento)", html:`
  <h2><span class="num">8</span>Gobierno (masking + consentimiento)</h2>
  <div class="obj-line"><span class="pill obj">OBJETIVO</span>Proteger PII y respetar consentimiento por fila.</div>
  <div class="biz"><span class="lbl">PARA NEGOCIO</span>Los datos personales quedan enmascarados y sólo usamos clientes con consentimiento: privacidad y cumplimiento por diseño.</div>
  ${prompt("Prompt CoCo","En GOBIERNO crea: masking policies para email, teléfono y nombre (idempotentes); una row access policy de consentimiento (no-admin solo ve consent_marketing=TRUE). Aplica masking a GOLD.CUSTOMER_360. Crea roles CDP_ADMIN / CDP_ANALISTA y otórgalos a jparrado. Demuestra el masking con USE SECONDARY ROLES NONE.")}
  <div class="res-line"><span class="pill res">RESULTADO</span>PII enmascarada + consentimiento aplicado por fila.</div>
  <div class="gotcha"><b>Gotcha:</b> la sesión usa SECONDARY_ROLES=ALL; si el rol admin está concedido, las políticas parecen no aplicar. Valida con <code class="inl">USE SECONDARY ROLES NONE</code>.</div>
 `},
 {id:"mb", grp:"Clean Room", title:"Padre de Mascotas — datos listos", html:`
  <h2>Padre de Mascotas — datos listos para el Clean Room</h2>
  <div class="obj-line"><span class="pill obj">OBJETIVO</span>La marca socia (Padre de Mascotas) <b>ya llega lista</b>: su audiencia hasheada está pre-provisionada. Aquí solo verificamos que está disponible para integrarla.</div>
  <div class="biz"><span class="lbl">PARA NEGOCIO</span>El socio no replica todo el CDP ni hace trabajo en vivo: ya tiene su lista de clientes en formato seguro (cifrada) lista para encontrarse con la Tienda Ceba en el clean room. Así mostramos el CDP a fondo en una sola cuenta (A) y B solo aporta sus datos.</div>
  ${prompt("Prompt CoCo — verificar (Cuenta B)","En la Cuenta B confirma que GOBIERNO.AUDIENCIA_CLEANROOM ya existe y está lista: cuenta filas y HASHED_EMAIL distintos (debe dar 500.010) y muéstrame 3 filas (HASHED_EMAIL, CITY, CONSENT_MARKETING) para confirmar que NO hay PII en claro.")}
  <div class="res-line"><span class="pill res">RESULTADO</span>Padre de Mascotas confirmada lista: audiencia hasheada de 500.010 (sin PII), persistente entre corridas — solo falta integrarla en el Clean Room (Parte 10).</div>
  <div class="gotcha"><b>Por qué pre-lista y mínima:</b> el overlap por tier usa el tier de la <b>Tienda Ceba</b>; el de B no se usa. B se prepara una sola vez (CRM → CUSTOMER_360 → audiencia hasheada) y queda persistente; no necesita eventos, modelo ni scores. Se evita duplicar el CDP en cada cuenta.</div>
 `},
 {id:"p11", grp:"Clean Room", title:"9 · Data Clean Room cross-account", html:`
  <h2><span class="num">9</span>Data Clean Room cross-account</h2>
  <div class="obj-line"><span class="pill obj">OBJETIVO</span>A y B encuentran clientes en común y activan sin compartir PII. Usa el skill <code class="inl">data-cleanrooms</code> de CoCo.</div>
  <div class="biz"><span class="lbl">PARA NEGOCIO</span>El momento clave: dos marcas descubren <b>125.000 clientes en común</b> (13.492 de alta propensión) sin que ninguna vea los correos de la otra.</div>
  ${prompt("Prompt CoCo — verificación + RBAC (A y B)","Verifica que Data Clean Rooms esté instalado (SHOW DATABASES LIKE 'SAMOOHA_BY_SNOWFLAKE_LOCAL_DB%'). Con ACCOUNTADMIN, otorga al rol CDP_ADMIN los privilegios de cuenta necesarios para crear/ver colaboraciones, registrar offerings y ejecutar análisis. Lista los privilegios otorgados.")}
  ${prompt("Prompt CoCo — audiencia NO-PII (Cuenta A)","Crea GOBIERNO.AUDIENCIA_CLEANROOM en la Tienda Ceba: una fila por cliente con SHA2(email_normalizado) AS HASHED_EMAIL, más atributos NO identificables (tier de propensión, ciudad, lifecycle_stage, flag consentimiento). Sin email/teléfono/nombre en claro. (Padre de Mascotas ya creó la suya en su paso mínimo.)")}
  ${prompt("Código exacto — audiencia NO-PII (Cuenta A)",`CREATE OR REPLACE TABLE TIENDA_CEBA_CDP.GOBIERNO.AUDIENCIA_CLEANROOM AS
SELECT SHA2(c.email,256)   AS HASHED_EMAIL,
       c.tier              AS TIER_PROPENSION,
       c.ciudad            AS CITY,
       c.lifecycle_stage   AS LIFECYCLE_STAGE,
       c.consent_marketing AS CONSENT_MARKETING
FROM TIENDA_CEBA_CDP.GOLD.CUSTOMER_360 c;`)}
  ${prompt("Prompt CoCo — registrar offerings (A y B)","Usando data-cleanrooms, registra cada audiencia como data offering: en A registra GOBIERNO.AUDIENCIA_CLEANROOM (HASHED_EMAIL como join key, activation_allowed) y en B la suya. USE SECONDARY ROLES NONE antes de REGISTER y ALL después.")}
  ${prompt("Código exacto — registrar offering (Cuenta A)",`USE ROLE ACCOUNTADMIN;
USE SECONDARY ROLES NONE;
CALL SAMOOHA_BY_SNOWFLAKE_LOCAL_DB.REGISTRY.REGISTER_DATA_OFFERING($$
api_version: 2.0.0
spec_type: data_offering
name: AUDIENCIA_CEBA
version: "v1"
description: Audiencia NO-PII de Tienda Ceba (hashed email + tier + ciudad)
datasets:
  - alias: audiencia
    data_object_fqn: TIENDA_CEBA_CDP.GOBIERNO.AUDIENCIA_CLEANROOM
    allowed_analyses: template_only
    object_class: custom
    schema_and_template_policies:
      HASHED_EMAIL:
        category: join_standard
        column_type: hashed_email_sha256
        activation_allowed: true
      TIER_PROPENSION: { category: passthrough }
      CITY:            { category: passthrough }
      LIFECYCLE_STAGE: { category: passthrough }
      CONSENT_MARKETING: { category: passthrough }
$$);
USE SECONDARY ROLES ALL;
-- En la Cuenta B (demo_account_aws_2): misma llamada con
--   name: AUDIENCIA_PADRE   y   data_object_fqn: PADRE_MASCOTAS_CDP.GOBIERNO.AUDIENCIA_CLEANROOM`)}
  ${prompt("Prompt CoCo — registrar template (Cuenta A)","Usando data-cleanrooms, registra con REGISTER_TEMPLATE un template de análisis CUSTOM que cuente el overlap por tier; referencia la columna de join como hashed_email_sha256 (NO hashed_email). Es el análisis que correremos en el clean room.")}
  ${prompt("Código exacto — template custom (Cuenta A)",`USE ROLE ACCOUNTADMIN;
CALL SAMOOHA_BY_SNOWFLAKE_LOCAL_DB.REGISTRY.REGISTER_TEMPLATE($$
api_version: 2.0.0
spec_type: template
name: mascotas_overlap_by_tier
version: "v1"
type: sql_analysis
description: Overlap A x B por tier de propension (hashed emails en comun)
template: |
  SELECT a.TIER_PROPENSION AS tier,
         COUNT(DISTINCT a.hashed_email_sha256) AS overlap_count
  FROM IDENTIFIER({{ source_table[0] }}) a
  INNER JOIN IDENTIFIER({{ source_table[1] }}) b
    ON a.hashed_email_sha256 = b.hashed_email_sha256
  GROUP BY a.TIER_PROPENSION
  ORDER BY overlap_count DESC
$$);`)}
  ${prompt("Prompt CoCo — crear colaboración (Cuenta A)","Usando data-cleanrooms, crea la colaboración cross-account \"MASCOTAS_OVERLAP\": A (esta) Owner + Data Provider + Analysis Runner y B (SFSENORTHAMERICA.DEMO_JPARRADO2) Data Provider. Incluye en el spec ambos offerings y el template de overlap por tier. Confírmame el spec antes de inicializar.")}
  ${prompt("Código exacto — crear colaboración (Cuenta A)",`USE ROLE ACCOUNTADMIN;
CALL SAMOOHA_BY_SNOWFLAKE_LOCAL_DB.COLLABORATION.INITIALIZE($$
api_version: "2.0.0"
spec_type: collaboration
name: MASCOTAS_OVERLAP
description: Overlap cross-account de clientes de mascotas sin compartir PII
collaborator_identifier_aliases:
  TIENDA_CEBA: SFSENORTHAMERICA.DEMO_JPARRADO
  PADRE_MASCOTAS: SFSENORTHAMERICA.DEMO_JPARRADO2
owner: TIENDA_CEBA
analysis_runners:
  TIENDA_CEBA:
    data_providers:
      TIENDA_CEBA:
        data_offerings:
          - id: AUDIENCIA_CEBA_v1
      PADRE_MASCOTAS:
        data_offerings:
          - id: AUDIENCIA_PADRE_v1
    templates:
      - id: mascotas_overlap_by_tier_v1
$$);`)}
  ${prompt("Prompt CoCo — unirse (Cuenta B)","Usando data-cleanrooms, revisa la invitación y únete a \"MASCOTAS_OVERLAP\". Al unirse, B acepta el template incluido en el spec (no hace falta aprobación aparte).")}
  ${prompt("Código exacto — unirse (Cuenta B)",`USE ROLE ACCOUNTADMIN;
USE SECONDARY ROLES NONE;
CALL SAMOOHA_BY_SNOWFLAKE_LOCAL_DB.COLLABORATION.JOIN('MASCOTAS_OVERLAP');
USE SECONDARY ROLES ALL;`)}
  ${prompt("Prompt CoCo — ejecutar overlap (Cuenta A runner)","Usando data-cleanrooms, ejecuta el template sobre las dos audiencias (con tamaño mínimo de grupo / k-anonymity). Resúmeme: overlap total, % sobre cada base y desglose por tier de propensión de A.")}
  ${prompt("Código exacto — ejecutar overlap (Cuenta A runner)",`CALL SAMOOHA_BY_SNOWFLAKE_LOCAL_DB.COLLABORATION.RUN('MASCOTAS_OVERLAP', $$
api_version: "2.0.0"
spec_type: "analysis"
name: "overlap_mascotas_por_tier"
description: "Overlap A x B por tier sobre hashed_email"
template: "mascotas_overlap_by_tier_v1"
template_configuration:
  view_mappings:
    source_tables:
      - "TIENDA_CEBA.AUDIENCIA_CEBA_v1.audiencia"
      - "PADRE_MASCOTAS.AUDIENCIA_PADRE_v1.audiencia"
  local_view_mappings:
    my_tables: []
  arguments: {}
$$);`)}
  <p><span class="pill gui">GUI</span>Snowsight → Data Clean Rooms → Create → añade Cuenta B como invitada.</p>
  <div class="res-line"><span class="pill res">RESULTADO</span>Overlap agregado por tier, sin que A vea los emails de B. Mensaje: campañas co-marca sobre clientes compartidos de alta propensión sin que ninguna marca entregue su CRM.</div>
  <div class="gotcha"><b>Gotchas:</b> la columna de join se expone con el nombre del tipo (<code class="inl">hashed_email_sha256</code>), no <code class="inl">hashed_email</code> — el template debe referenciar ese nombre. Incluye el template en el spec del INITIALIZE para que B lo acepte al unirse (o añádelo luego con <code class="inl">ADD_TEMPLATE_REQUEST</code> + <code class="inl">APPROVE_UPDATE_REQUEST</code> en B). Usa <code class="inl">USE SECONDARY ROLES NONE</code> antes de REGISTER/JOIN/LINK y <code class="inl">ALL</code> después. La activación directa al runner puede fallar con <code class="inl">ACTIVATION_DATA_… does not exist</code> (borde de auto-activación); el overlap agregado por tier es el entregable central. Nunca consultes tablas internas de SAMOOHA; solo procedimientos CALL.</div>
  <div class="res-line"><span class="pill res">VALIDADO</span>Overlap real A∩B = <b>125.000</b> (25% de cada base) · por tier de A: Alto <b>13.492</b>, Medio 57.896, Bajo 53.612 — computado en el clean room sin compartir PII.</div>
 `},
 {id:"p12", grp:"App", title:"10 · App React + SPCS", html:`
  <h2><span class="num">10</span>App React + SPCS</h2>
  <div class="obj-line"><span class="pill obj">OBJETIVO</span>Visualizar CDP + Clean Room en una app con URL pública SSO.</div>
  <div class="biz"><span class="lbl">PARA NEGOCIO</span>Todo lo anterior en una app visual con URL propia, para que negocio lo explore y lo presente sin tocar SQL.</div>
  ${prompt("Prompt CoCo — snapshots","Exporta a app/public/data/ los snapshots JSON que necesita la app:\n- kpis.json, tiers.json (de GOLD.CUSTOMER_360)\n- customers.json: muestra de 8000 clientes con score y tier\n- identity.json: aristas para el grafo (ARRAY PLANO)\n- overlap.json: resultado del clean room (overlap, %, lift)\n- roi.json: de SEGMENTS.ACTIVACIONES (Masivo/paid vs Dirigido-CDP/email)\nUsa snow sql --format json -q \"...\" 1>archivo (NO uses USE WAREHOUSE en el -q).")}

function prompt(lbl, code){
  const esc = code.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  return `<div class="prompt"><div class="lbl">${lbl}</div><button class="copy">Copiar</button><pre>${esc}</pre></div>`;
}

// Render nav
const nav = document.getElementById("nav");
nav.innerHTML = `<div class="logo"><img src="https://www.snowflake.com/wp-content/themes/snowflake/assets/img/logo-blue.svg" alt="Snowflake"></div><div class="brand">HOL CDP + Clean Room</div><div class="sub">HAVAS · de cero a app</div>`;
let lastGrp = "";
parts.forEach((p,i)=>{
  if(p.grp!==lastGrp){ const g=document.createElement("div"); g.className="grp"; g.textContent=p.grp; nav.appendChild(g); lastGrp=p.grp; }
  const a=document.createElement("a"); a.className="item"; a.href="#"+p.id; a.textContent=p.title; a.dataset.idx=i;
  a.onclick=(e)=>{e.preventDefault(); go(i);};
  nav.appendChild(a);
});

const content=document.getElementById("content");
const bar=document.getElementById("bar");
let cur=0;

function go(i){
  cur=Math.max(0,Math.min(parts.length-1,i));
  content.innerHTML=`<section class="part active">${parts[cur].html}</section>`;
  document.querySelectorAll("nav .item").forEach(a=>a.classList.toggle("active", +a.dataset.idx===cur));
  bar.style.width=((cur+1)/parts.length*100)+"%";
  document.getElementById("prev").disabled = cur===0;
  document.getElementById("next").disabled = cur===parts.length-1;
  // copy buttons
  content.querySelectorAll(".prompt .copy").forEach(btn=>{
    btn.onclick=()=>{
      const txt=btn.parentElement.querySelector("pre").innerText;
      navigator.clipboard.writeText(txt).then(()=>{
        btn.textContent="Copiado ✓"; btn.classList.add("done");
        setTimeout(()=>{btn.textContent="Copiar"; btn.classList.remove("done");},1500);
      }).catch(()=>{btn.textContent="Error";});
    };
  });
  // arquitectura: chulitos de progreso (persistente)
  const aKEY="havasArqDone";
  let aDone={}; try{aDone=JSON.parse(localStorage.getItem(aKEY)||"{}")}catch(e){aDone={}}
  const aNodes=content.querySelectorAll(".anode");
  const aCount=content.querySelector("#arqCount");
  const aUpd=()=>{ if(aCount){const n=Object.values(aDone).filter(Boolean).length; aCount.textContent=n+" / "+aNodes.length+" completados";} };
  aNodes.forEach(nd=>{
    const k=nd.getAttribute("data-k");
    if(aDone[k]) nd.classList.add("on");
    nd.addEventListener("click",()=>{
      const v=!nd.classList.contains("on");
      nd.classList.toggle("on",v); aDone[k]=v;
      localStorage.setItem(aKEY,JSON.stringify(aDone)); aUpd();
    });
  });
  aUpd();
  const aReset=content.querySelector("#arqReset");
  if(aReset) aReset.onclick=()=>{ aDone={}; localStorage.removeItem(aKEY); aNodes.forEach(n=>n.classList.remove("on")); aUpd(); };
  window.scrollTo({top:0,behavior:"smooth"});
  if(location.hash!=="#"+parts[cur].id) history.replaceState(null,"","#"+parts[cur].id);
}
document.getElementById("prev").onclick=()=>go(cur-1);
document.getElementById("next").onclick=()=>go(cur+1);
document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowLeft") go(cur-1);
  if(e.key==="ArrowRight") go(cur+1);
});
// initial from hash
const h=location.hash.slice(1);
const start=parts.findIndex(p=>p.id===h);
go(start>=0?start:0);
</script>
